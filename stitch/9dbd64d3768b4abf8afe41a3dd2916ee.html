<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alışkanlık Takipçisi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {

                    "tertiary-fixed-dim": "#ffb3af",

                    "tertiary-container": "#fc7c78",

                    "on-surface": "#dde4dd",
                    "surface-bright": "#343b36",
                    "tertiary-fixed": "#ffdad7",
                    "on-tertiary-fixed": "#410005",
                    "on-primary": "#003824",
                    "on-background": "#dde4dd",
                    "primary": "#4edea3",
                    "error-container": "#93000a",
                    "tertiary": "#ffb3af",
                    "primary-container": "#10b981",
                    "surface-variant": "#2f3632",
                    "surface-tint": "#4edea3",
                    "surface-dim": "#0e1511",
                    "surface-container-high": "#242c27",
                    "on-secondary-container": "#abb9d2",
                    "inverse-on-surface": "#2b322d",
                    "on-tertiary-fixed-variant": "#842225",
                    "inverse-surface": "#dde4dd",
                    "background": "#0e1511",
                    "surface-container": "#1a211d",
                    "on-tertiary": "#650911",
                    "on-secondary-fixed-variant": "#3a485c",
                    "inverse-primary": "#006c49",
                    "on-error": "#690005",
                    "on-primary-fixed": "#002113",
                    "secondary-fixed": "#d5e3fd",
                    "surface-container-highest": "#2f3632",
                    "error": "#ffb4ab",
                    "primary-fixed": "#6ffbbe",
                    "secondary-fixed-dim": "#b9c7e0",
                    "outline": "#86948a",
                    "on-error-container": "#ffdad6",
                    "surface-container-lowest": "#09100c",
                    "surface-container-low": "#161d19",
                    "outline-variant": "#3c4a42",
                    "on-primary-fixed-variant": "#005236",
                    "secondary": "#b9c7e0",
                    "on-secondary-fixed": "#0d1c2f",
                    "on-primary-container": "#00422b"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "lg": "24px",
                    "xs": "4px",
                    "md": "16px",
                    "margin": "20px",
                    "sm": "8px",
                    "xl": "32px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "body-md": [
                            "Inter"
                    ],
                    "label-sm": [
                            "Inter"
                    ],
                    "h1": [
                            "Inter"
                    ],
                    "display": [
                            "Inter"
                    ],
                    "body-lg": [
                            "Inter"
                    ],
                    "h2": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "body-md": [
                            "14px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "label-sm": [
                            "12px",
                            {
                                    "lineHeight": "1.4",
                                    "letterSpacing": "0.01em",
                                    "fontWeight": "500"
                            }
                    ],
                    "h1": [
                            "24px",
                            {
                                    "lineHeight": "1.3",
                                    "fontWeight": "600"
                            }
                    ],
                    "display": [
                            "32px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-lg": [
                            "16px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "h2": [
                            "20px",
                            {
                                    "lineHeight": "1.4",
                                    "fontWeight": "600"
                            }
                    }
            }
          }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24 md:pb-0">
<!-- TopNavBar Web -->
<header class="hidden md:flex bg-slate-900 flex-col font-inter text-sm antialiased docked full-width top-0 border-b border-b border-slate-800 flat no shadows flex justify-between items-center px-5 h-16 w-full max-w-7xl mx-auto sticky z-50">
<div class="flex items-center justify-between w-full h-full">
<h1 class="text-xl font-bold text-emerald-500 tracking-tight">Alışkanlık Takipçisi</h1>
<nav class="flex items-center gap-md">
<a class="text-emerald-500 font-semibold active:scale-95 transition-transform flex items-center gap-xs" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Alışkanlıklar
                </a>
<a class="text-slate-400 hover:bg-slate-800 hover:text-emerald-400 transition-colors active:scale-95 transition-transform px-sm py-xs rounded-DEFAULT flex items-center gap-xs" href="#">
<span class="material-symbols-outlined">leaderboard</span>
                    İstatistikler
                </a>
<a class="text-slate-400 hover:bg-slate-800 hover:text-emerald-400 transition-colors active:scale-95 transition-transform px-sm py-xs rounded-DEFAULT flex items-center gap-xs" href="#">
<span class="material-symbols-outlined">person</span>
                    Profil
                </a>
<button aria-label="settings" class="text-slate-400 hover:bg-slate-800 hover:text-emerald-400 transition-colors p-sm rounded-full ml-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">settings</span>
</button>
</nav>
</div>
</header>
<!-- TopNavBar Mobile -->
<header class="md:hidden bg-slate-900 font-inter text-sm antialiased flex justify-between items-center px-5 h-16 w-full sticky top-0 z-40 border-b border-slate-800 shadow-sm">
<h1 class="text-xl font-bold text-emerald-500 tracking-tight">Alışkanlık Takipçisi</h1>
<button aria-label="settings" class="text-slate-400 hover:bg-slate-800 hover:text-emerald-400 transition-colors p-sm rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="max-w-7xl mx-auto p-margin md:p-lg grid grid-cols-4 md:grid-cols-12 gap-lg">
<!-- Add Habit Section -->
<section class="col-span-4 md:col-span-12 bg-surface-container rounded-xl p-md border border-outline-variant shadow-lg flex flex-col gap-sm">
<h2 class="font-h2 text-h2 text-on-surface mb-xs">Yeni Alışkanlık Ekle</h2>
<form class="flex flex-col md:flex-row gap-sm items-stretch md:items-center w-full">
<div class="relative flex-grow">
<input class="w-full bg-surface-container-high border border-outline-variant text-on-surface rounded-lg px-md py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant font-body-md text-body-md" placeholder="Örn: Kitap oku, Spor yap..." type="text"/>
</div>
<button class="bg-primary-container text-on-primary-container font-label-sm text-label-sm px-lg py-sm rounded-lg hover:bg-primary hover:text-on-primary transition-colors active:scale-[0.98] flex items-center justify-center gap-xs font-semibold whitespace-nowrap shadow-md" type="button">
<span class="material-symbols-outlined text-[18px]">add</span>
                    Ekle
                </button>
</form>
</section>
<!-- Habit List Section -->
<section class="col-span-4 md:col-span-12 flex flex-col gap-sm">
<!-- Completed Habit -->
<div class="bg-surface-container rounded-xl p-md border border-outline-variant flex items-center justify-between group hover:border-outline transition-colors">
<div class="flex items-center gap-md opacity-60">
<button class="text-primary flex-shrink-0 focus:outline-none active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<span class="font-body-lg text-body-lg text-on-surface line-through decoration-on-surface-variant">Günlük 2 Litre Su İç</span>
</div>
<button aria-label="Sil" class="text-error hover:bg-error-container hover:text-on-error-container p-xs rounded-full transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Uncompleted Habit -->
<div class="bg-surface-container rounded-xl p-md border border-outline-variant flex items-center justify-between group hover:border-outline transition-colors shadow-sm">
<div class="flex items-center gap-md">
<button class="text-outline-variant hover:text-primary transition-colors flex-shrink-0 focus:outline-none active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[28px]">radio_button_unchecked</span>
</button>
<span class="font-body-lg text-body-lg text-on-surface font-medium">30 Dakika Yürüyüş</span>
</div>
<button aria-label="Sil" class="text-error hover:bg-error-container hover:text-on-error-container p-xs rounded-full transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Uncompleted Habit (Dummy 3) -->
<div class="bg-surface-container rounded-xl p-md border border-outline-variant flex items-center justify-between group hover:border-outline transition-colors shadow-sm">
<div class="flex items-center gap-md">
<button class="text-outline-variant hover:text-primary transition-colors flex-shrink-0 focus:outline-none active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[28px]">radio_button_unchecked</span>
</button>
<span class="font-body-lg text-body-lg text-on-surface font-medium">Meditasyon Yap (10dk)</span>
</div>
<button aria-label="Sil" class="text-error hover:bg-error-container hover:text-on-error-container p-xs rounded-full transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Summary Footer -->
<div class="mt-md text-center md:text-left">
<p class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container-high inline-block px-md py-xs rounded-full border border-outline-variant">
                    Toplam 3 Alışkanlık, 1 Tamamlandı
                </p>
</div>
</section>
</main>
<!-- BottomNavBar Mobile -->
<nav class="md:hidden bg-slate-900/95 backdrop-blur-md font-inter text-[10px] font-medium fixed bottom-0 w-full z-50 border-t border-t border-slate-800 shadow-2xl fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 h-20">
<a class="flex flex-col items-center justify-center text-emerald-500 bg-emerald-500/10 rounded-xl px-3 py-1 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>Alışkanlıklar</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-emerald-400 active:scale-90 transition-all px-3 py-1" href="#">
<span class="material-symbols-outlined mb-1">leaderboard</span>
<span>İstatistikler</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-emerald-400 active:scale-90 transition-all px-3 py-1" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span>Profil</span>
</a>
</nav>
</body></html>
